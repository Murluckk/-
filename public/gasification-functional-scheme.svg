<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 540" font-family="Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="black"/>
    </marker>
    <style>
      .blk   { fill: white; stroke: black; stroke-width: 1.4; }
      .ttl   { font-size: 13px; font-style: italic; text-anchor: middle; }
      .op    { font-size: 12px; }
      .lab   { font-size: 12px; font-style: italic; }
      .ln    { fill: none; stroke: black; stroke-width: 1.2; }
      .title { font-size: 18px; font-weight: bold; }
      .sub   { font-size: 12px; font-style: italic; }
    </style>
  </defs>

  <text x="20" y="28" class="title">Функциональная схема газификации ТГИ в плотном слое</text>
  <text x="20" y="48" class="sub">Чертёж, на котором в виде блоков изображены технологические стадии (узлы) производства; внутри каждого блока перечислены реализуемые операции</text>

  <!-- ввод сырья сверху -->
  <line class="ln" x1="180" y1="100" x2="180" y2="140" marker-end="url(#arr)"/>
  <text x="190" y="115" class="lab">Сырьё (уголь S1) + воздух G3</text>

  <!-- ===== Блок 1 ===== -->
  <rect class="blk" x="60" y="140" width="380" height="40"/>
  <text x="250" y="165" class="ttl">Подготовка сырья</text>

  <rect class="blk" x="60" y="180" width="380" height="170"/>
  <text x="80" y="205" class="op">Загрузка угля в бункер</text>
  <text x="80" y="228" class="op">Дозирование и подача в шахту газогенератора</text>
  <text x="80" y="251" class="op">Подвод воздушного дутья</text>
  <text x="80" y="274" class="op">Подогрев воздуха золой и шлаком</text>
  <text x="80" y="297" class="op">Смешение S1 + G3 в верхней части слоя</text>
  <text x="80" y="320" class="op">Регулирование толщины плотного слоя</text>
  <text x="80" y="343" class="op">(колосниковая решётка)</text>

  <!-- стрелка 1 -> 2 -->
  <line class="ln" x1="440" y1="245" x2="510" y2="245" marker-end="url(#arr)"/>
  <text x="445" y="237" class="lab">Подготовленное топливо</text>

  <!-- ===== Блок 2 ===== -->
  <rect class="blk" x="510" y="140" width="380" height="40"/>
  <text x="700" y="165" class="ttl">Химические превращения</text>

  <rect class="blk" x="510" y="180" width="380" height="170"/>
  <text x="530" y="205" class="op">Сушка топлива поднимающимися горячими газами</text>
  <text x="530" y="228" class="op">Пиролиз (полукоксование) с выделением летучих</text>
  <text x="530" y="251" class="op">Восстановление CO₂ и H₂O до CO и H₂</text>
  <text x="530" y="274" class="op">Горение углерода кокса в зоне дутья</text>
  <text x="530" y="297" class="op">Шлакообразование и отвод золы (S5)</text>
  <text x="530" y="320" class="op">Образование сырого генераторного газа G1</text>

  <!-- стрелка 2 -> 3 -->
  <line class="ln" x1="890" y1="245" x2="960" y2="245" marker-end="url(#arr)"/>
  <text x="895" y="237" class="lab">Сырой генераторный газ G1</text>

  <!-- ===== Блок 3 ===== -->
  <rect class="blk" x="960" y="140" width="440" height="40"/>
  <text x="1180" y="165" class="ttl">Выделение и очистка продукта</text>

  <rect class="blk" x="960" y="180" width="440" height="170"/>
  <text x="980" y="205" class="op">Сухое пылеудаление в циклоне (S6 — пыль)</text>
  <text x="980" y="228" class="op">Мокрое пылеудаление в скруббере (L1 — вода, L2 — стоки)</text>
  <text x="980" y="251" class="op">Подача орошающей воды насосом</text>
  <text x="980" y="274" class="op">Охлаждение газа (хладагент L3 / L3′)</text>
  <text x="980" y="297" class="op">Тонкая очистка от воды и углеводородов (L4 — конденсат + смолы)</text>
  <text x="980" y="320" class="op">Компримирование, распределение, буферное хранение</text>

  <!-- выход справа -->
  <line class="ln" x1="1400" y1="245" x2="1470" y2="245" marker-end="url(#arr)"/>
  <text x="1405" y="237" class="lab">Товарный газ G7</text>

  <!-- Возврат рециркуляции (как в образце "Газовый теплоноситель") -->
  <line class="ln" x1="1180" y1="350" x2="1180" y2="395"/>
  <line class="ln" x1="1180" y1="395" x2="700" y2="395"/>
  <line class="ln" x1="700" y1="395" x2="700" y2="350" marker-end="url(#arr)"/>
  <text x="900" y="388" class="lab" text-anchor="middle">Рециркуляция тепла дымовых / горячих газов</text>

  <!-- Побочные потоки вниз с подписями -->
  <line class="ln" x1="180" y1="350" x2="180" y2="430" marker-end="url(#arr)"/>
  <text x="190" y="425" class="lab">Подогретый воздух (внутр.)</text>

  <line class="ln" x1="700" y1="350" x2="700" y2="455" marker-end="url(#arr)"/>
  <text x="710" y="450" class="lab">Зола / шлак S5</text>

  <line class="ln" x1="1180" y1="350" x2="1180" y2="455"/>
  <line class="ln" x1="1100" y1="455" x2="1260" y2="455"/>
  <line class="ln" x1="1100" y1="455" x2="1100" y2="495" marker-end="url(#arr)"/>
  <text x="1080" y="490" class="lab" text-anchor="end">S6 — пыль</text>
  <line class="ln" x1="1180" y1="455" x2="1180" y2="495" marker-end="url(#arr)"/>
  <text x="1180" y="510" class="lab" text-anchor="middle">L2 — стоки</text>
  <line class="ln" x1="1260" y1="455" x2="1260" y2="495" marker-end="url(#arr)"/>
  <text x="1280" y="490" class="lab">L4 — смолы</text>
</svg>
